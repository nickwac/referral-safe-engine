version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: referral-postgres
    environment:
      POSTGRES_DB: referral_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d referral_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: referral-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/referral_db
      API_TITLE: Cycle-Safe Referral Engine
      MAX_CLAIMS_PER_MINUTE: 5
      REWARD_MAX_DEPTH: 3
      DEFAULT_REWARD_AMOUNTS: 10,5,2
      DEBUG: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
